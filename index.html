<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#fff;font-family:'Courier New',monospace;min-height:100vh;overflow:hidden;}
.wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px;position:relative;z-index:2;}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;}
.logo-ring{width:120px;height:120px;border-radius:50%;border:3px solid #00cc44;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;animation:ring-pulse 2s ease-in-out infinite;position:relative;}
.logo-ring::before{content:'';position:absolute;inset:-8px;border-radius:50%;border:1px solid rgba(0,204,68,0.3);animation:ring-pulse 2s ease-in-out infinite 0.5s;}
.logo-inner{font-size:32px;font-weight:900;color:#00cc44;letter-spacing:2px;text-shadow:0 0 20px #00cc44;}
.pk-badge{background:#006400;color:#ffffff;font-size:13px;font-weight:700;letter-spacing:3px;padding:6px 20px;border-radius:4px;margin-bottom:20px;border:1px solid #00cc44;text-transform:uppercase;animation:badge-glow 1.5s ease-in-out infinite alternate;}
.title{font-size:clamp(28px,6vw,64px);font-weight:900;color:#ffffff;letter-spacing:6px;text-transform:uppercase;margin-bottom:6px;line-height:1.1;}
.title span{color:#00cc44;}
.subtitle{font-size:clamp(13px,2.5vw,20px);color:#888;letter-spacing:4px;text-transform:uppercase;margin-bottom:32px;}
.divider{width:200px;height:1px;background:#00cc44;margin:0 auto 28px;opacity:0.6;}
.coming-soon{font-size:clamp(16px,3.5vw,36px);font-weight:900;color:#00cc44;letter-spacing:8px;text-transform:uppercase;animation:blink-green 1s infinite;margin-bottom:28px;text-shadow:0 0 15px #00cc44;}
.countdown-row{display:flex;gap:16px;justify-content:center;margin-bottom:32px;}
.count-box{text-align:center;background:rgba(0,204,68,0.08);border:1px solid rgba(0,204,68,0.3);border-radius:8px;padding:12px 16px;min-width:64px;}
.count-num{font-size:clamp(22px,4vw,40px);font-weight:900;color:#00cc44;display:block;font-family:'Courier New',monospace;}
.count-lbl{font-size:10px;color:#555;letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.pk-line{font-size:clamp(13px,2.5vw,20px);color:#00cc44;letter-spacing:5px;font-weight:700;text-transform:uppercase;animation:pk-glow 1.2s ease-in-out infinite alternate;margin-bottom:6px;}
.pk-flag-row{font-size:22px;letter-spacing:4px;margin-bottom:22px;}
.url{font-size:13px;color:#444;letter-spacing:3px;margin-top:8px;}
.url a{color:#00cc44;text-decoration:none;}
.dots{display:flex;gap:8px;justify-content:center;margin-top:24px;}
.dot{width:8px;height:8px;border-radius:50%;background:#00cc44;animation:dot-pulse 1.2s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}
@keyframes ring-pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,204,68,0.4),0 0 20px rgba(0,204,68,0.2);}50%{box-shadow:0 0 0 12px rgba(0,204,68,0),0 0 40px rgba(0,204,68,0.4);}}
@keyframes badge-glow{0%{box-shadow:0 0 5px #00cc44;}100%{box-shadow:0 0 20px #00cc44,0 0 40px rgba(0,204,68,0.3);}}
@keyframes blink-green{0%,49%{opacity:1;}50%,100%{opacity:0.15;}}
@keyframes pk-glow{0%{text-shadow:0 0 5px #00cc44;}100%{text-shadow:0 0 20px #00cc44,0 0 40px #00cc44;}}
@keyframes dot-pulse{0%,80%,100%{transform:scale(0.6);opacity:0.4;}40%{transform:scale(1);opacity:1;}}
</style>

<canvas id="c"></canvas>
<div class="wrap">
  <div class="pk-badge">&#127477;&#127472; Pakistan on Top &#127477;&#127472;</div>
  <div class="logo-ring"><div class="logo-inner">C3R</div></div>
  <div class="title">CO3ER <span>DEV</span></div>
  <div class="subtitle">Development Studio</div>
  <div class="divider"></div>
  <div class="coming-soon">Coming Soon</div>
  <div class="countdown-row">
    <div class="count-box"><span class="count-num" id="cd-d">00</span><div class="count-lbl">Days</div></div>
    <div class="count-box"><span class="count-num" id="cd-h">00</span><div class="count-lbl">Hours</div></div>
    <div class="count-box"><span class="count-num" id="cd-m">00</span><div class="count-lbl">Mins</div></div>
    <div class="count-box"><span class="count-num" id="cd-s">00</span><div class="count-lbl">Secs</div></div>
  </div>
  <div class="pk-line">&#9733; Pakistan Zindabad &#9733;</div>
  <div class="pk-flag-row">&#127477;&#127472; &nbsp; &#127477;&#127472; &nbsp; &#127477;&#127472;</div>
  <div class="url">Visit us at <a href="https://co3er.site">co3er.site</a></div>
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();
window.addEventListener('resize',resize);
const cols=Math.floor(window.innerWidth/18);
const drops=Array(cols).fill(1);
const chars='01CO3ERPAKISTANZINDABAD010111';
function draw(){
  ctx.fillStyle='rgba(0,0,0,0.06)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let i=0;i<drops.length;i++){
    const ch=chars[Math.floor(Math.random()*chars.length)];
    ctx.fillStyle=Math.random()>0.92?'#00ff55':'#004400';
    ctx.font='14px monospace';
    ctx.fillText(ch,i*18,drops[i]*18);
    if(drops[i]*18>canvas.height&&Math.random()>0.975)drops[i]=0;
    drops[i]++;
  }
}
setInterval(draw,55);

const launch=new Date();
launch.setDate(launch.getDate()+30);
function tick(){
  const now=new Date();
  const diff=Math.max(0,launch-now);
  const d=Math.floor(diff/86400000);
  const h=Math.floor((diff%86400000)/3600000);
  const m=Math.floor((diff%3600000)/60000);
  const s=Math.floor((diff%60000)/1000);
  document.getElementById('cd-d').textContent=String(d).padStart(2,'0');
  document.getElementById('cd-h').textContent=String(h).padStart(2,'0');
  document.getElementById('cd-m').textContent=String(m).padStart(2,'0');
  document.getElementById('cd-s').textContent=String(s).padStart(2,'0');
}
tick();
setInterval(tick,1000);
</script>
