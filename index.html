<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #ffffff;
      --fg:         #0a0a0a;
      --primary:    #0a0a0a;
      --primary-fg: #ffffff;
      --muted:      #f4f4f5;
      --muted-fg:   #71717a;
      --border:     #e4e4e7;
      --card:       #ffffff;
      --destructive:#dc2626;
      --ring:       rgba(10,10,10,0.3);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      overflow-x: hidden;
    }

    /* ── Canvas confetti ── */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
    }

    /* ── Main container ── */
    .container {
      width: 100%;
      max-width: 900px;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .container.visible { opacity: 1; transform: translateY(0); }

    /* ── Stagger children ── */
    .stagger { opacity: 0; transform: translateY(20px); }
    .stagger.show {
      animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .stagger:nth-child(1) { animation-delay: 0s; }
    .stagger:nth-child(2) { animation-delay: 0.15s; }
    .stagger:nth-child(3) { animation-delay: 0.3s; }
    .stagger:nth-child(4) { animation-delay: 0.45s; }
    .stagger:nth-child(5) { animation-delay: 0.6s; }
    .stagger:nth-child(6) { animation-delay: 0.75s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 1rem;
      background: rgba(10,10,10,0.08);
      color: var(--primary);
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
    }
    .badge svg { width: 15px; height: 15px; flex-shrink: 0; }

    /* ── Heading ── */
    .hero-title {
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--fg);
      margin-bottom: 1rem;
    }

    .hero-sub {
      font-size: clamp(1.1rem, 3vw, 1.7rem);
      color: var(--muted-fg);
      margin-bottom: 0.75rem;
      font-weight: 400;
    }

    .hero-date {
      font-size: 1rem;
      color: rgba(113,113,122,0.7);
      font-style: italic;
      margin-bottom: 3rem;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.75rem;
      width: 100%;
      max-width: 440px;
      margin: 0 auto;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--fg);
      margin-bottom: 0.2rem;
    }

    .card-desc {
      font-size: 0.84rem;
      color: var(--muted-fg);
      margin-bottom: 1.25rem;
    }

    /* ── Form ── */
    .form-row {
      display: flex;
      gap: 0.5rem;
    }

    .form-input {
      flex: 1;
      padding: 0.55rem 0.85rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 0.9rem;
      color: var(--fg);
      font-family: inherit;
      outline: none;
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    .form-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--ring);
    }
    .form-input::placeholder { color: rgba(113,113,122,0.5); }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.55rem 1.1rem;
      background: var(--primary);
      color: var(--primary-fg);
      border: none;
      border-radius: 7px;
      font-size: 0.88rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      white-space: nowrap;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary svg { width: 15px; height: 15px; }

    .error-msg {
      font-size: 0.8rem;
      color: var(--destructive);
      margin-top: 0.5rem;
      min-height: 1.1em;
      display: none;
    }
    .error-msg.show { display: block; }

    /* ── Success state ── */
    .success-state {
      display: none;
      text-align: center;
      padding: 1rem 0;
    }
    .success-state.show { display: block; }
    .success-icon {
      width: 64px; height: 64px;
      background: rgba(10,10,10,0.07);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }
    .success-icon svg { width: 30px; height: 30px; }
    .success-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.35rem; }
    .success-sub { font-size: 0.84rem; color: var(--muted-fg); }

    /* ── Socials ── */
    .socials-label {
      font-size: 0.8rem;
      color: var(--muted-fg);
      margin-bottom: 0.85rem;
    }
    .socials-row {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .social-btn {
      padding: 0.5rem 1.1rem;
      background: var(--muted);
      color: var(--fg);
      border: none;
      border-radius: 7px;
      font-size: 0.84rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
      display: inline-block;
    }
    .social-btn:hover { background: #e4e4e7; }
    .social-btn:active { transform: scale(0.95); }

    /* ── Spinner ── */
    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      display: none;
    }
    .btn-primary.loading .spinner { display: block; }
    .btn-primary.loading .btn-label { display: none; }
    .btn-primary.loading .btn-icon { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .form-row { flex-direction: column; }
      .btn-primary { width: 100%; }
    }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="container" id="main">
  <div style="text-align:center; margin-bottom: 3rem;">

    <!-- Badge -->
    <div class="stagger">
      <div class="badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Launching Soon
      </div>
    </div>

    <!-- Heading -->
    <div class="stagger">
      <h1 class="hero-title">Coming Soon</h1>
    </div>

    <!-- Subheading -->
    <div class="stagger">
      <p class="hero-sub">Something amazing is on the way</p>
    </div>

    <!-- Date -->
    <div class="stagger">
      <p class="hero-date">Expected Launch: Summer 2025</p>
    </div>
  </div>

  <!-- Newsletter card -->
  <div class="stagger" style="display:flex; justify-content:center; margin-bottom:4rem;">
    <div class="card">

      <!-- Form state -->
      <div id="form-state">
        <p class="card-title">Get notified when we launch</p>
        <p class="card-desc">Be the first to know when we go live.</p>
        <form id="newsletter-form" onsubmit="handleSubmit(event)">
          <div class="form-row">
            <input
              class="form-input"
              type="email"
              id="email-input"
              placeholder="you@example.com"
              autocomplete="email"
            />
            <button class="btn-primary" type="submit" id="submit-btn">
              <span class="spinner"></span>
              <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
              <span class="btn-label">Subscribe</span>
            </button>
          </div>
          <p class="error-msg" id="error-msg"></p>
        </form>
      </div>

      <!-- Success state -->
      <div class="success-state" id="success-state">
        <div class="success-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
        <p class="success-title">Thank you for subscribing!</p>
        <p class="success-sub">We'll notify you when we launch.</p>
      </div>

    </div>
  </div>

  <!-- Socials -->
  <div class="stagger" style="text-align:center;">
    <p class="socials-label">Follow us for updates</p>
    <div class="socials-row">
      <a href="#" class="social-btn">Twitter</a>
      <a href="#" class="social-btn">Instagram</a>
      <a href="#" class="social-btn">LinkedIn</a>
    </div>
  </div>
</div>

<script>
  /* ── Entrance animation ── */
  window.addEventListener('load', () => {
    setTimeout(() => {
      document.getElementById('main').classList.add('visible');
      document.querySelectorAll('.stagger').forEach(el => el.classList.add('show'));
    }, 200);
  });

  /* ── Form submission ── */
  async function handleSubmit(e) {
    e.preventDefault();
    const emailInput = document.getElementById('email-input');
    const errorMsg   = document.getElementById('error-msg');
    const submitBtn  = document.getElementById('submit-btn');
    const email = emailInput.value.trim();

    // Reset error
    errorMsg.textContent = '';
    errorMsg.classList.remove('show');

    // Validate
    if (!email) {
      showError('Email is required');
      return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showError('Please enter a valid email address');
      return;
    }

    // Submit
    submitBtn.disabled = true;
    submitBtn.classList.add('loading');

    try {
      await new Promise(r => setTimeout(r, 1000)); // simulate API
      console.log('Subscribed:', email);
      showSuccess();
      launchConfetti();
    } catch {
      showError('An error occurred. Please try again.');
      submitBtn.disabled = false;
      submitBtn.classList.remove('loading');
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('show');
  }

  function showSuccess() {
    document.getElementById('form-state').style.display = 'none';
    const s = document.getElementById('success-state');
    s.classList.add('show');
    s.style.animation = 'fadeUp 0.5s ease forwards';
  }

  /* ── Confetti ── */
  function launchConfetti() {
    const canvas = document.getElementById('confetti-canvas');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;

    const ctx = canvas.getContext('2d');
    const pieces = [];
    const colors = ['#0a0a0a','#71717a','#a1a1aa','#d4d4d8','#f4f4f5','#e4e4e7'];

    for (let i = 0; i < 120; i++) {
      pieces.push({
        x: Math.random() * canvas.width,
        y: canvas.height * 0.55 + Math.random() * 80 - 40,
        vx: (Math.random() - 0.5) * 8,
        vy: -(Math.random() * 10 + 5),
        r: Math.random() * 6 + 3,
        color: colors[Math.floor(Math.random() * colors.length)],
        rot: Math.random() * Math.PI * 2,
        rotV: (Math.random() - 0.5) * 0.2,
        shape: Math.random() > 0.5 ? 'rect' : 'circle',
        w: Math.random() * 10 + 5,
        h: Math.random() * 6 + 3,
      });
    }

    let frame = 0;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pieces.forEach(p => {
        p.x  += p.vx;
        p.y  += p.vy;
        p.vy += 0.25;
        p.vx *= 0.99;
        p.rot += p.rotV;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = Math.max(0, 1 - frame / 120);

        if (p.shape === 'circle') {
          ctx.beginPath();
          ctx.arc(0, 0, p.r, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        }
        ctx.restore();
      });

      frame++;
      if (frame < 140) requestAnimationFrame(draw);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    draw();
  }
</script>
</body>
</html>
