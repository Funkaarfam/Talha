
<style>
*{margin:0;padding:0;box-sizing:border-box}
.hk{
  min-height:100vh;
  font-family:'Courier New',monospace;
  overflow:hidden;position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem 1rem;
  background:#000;
  animation:bw-blink 0.18s step-end infinite;
}
@keyframes bw-blink{
  0%{background:#000;color:#fff;filter:invert(0)}
  25%{background:#fff;color:#000;filter:invert(1)}
  50%{background:#000;color:#fff;filter:invert(0)}
  75%{background:#111;color:#eee;filter:invert(0) contrast(2)}
  100%{background:#000;color:#fff;filter:invert(0)}
}
canvas#rain{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;mix-blend-mode:difference}
.scanlines{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.06) 2px,rgba(255,255,255,0.06) 4px);
  pointer-events:none;z-index:4;
  animation:sl 0.1s linear infinite;
}
@keyframes sl{0%{background-position:0 0}100%{background-position:0 8px}}
.vignette{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:radial-gradient(ellipse at center,transparent 25%,rgba(0,0,0,0.95) 100%);
  pointer-events:none;z-index:3;
  animation:vig-blink 0.18s step-end infinite;
}
@keyframes vig-blink{
  0%,50%{background:radial-gradient(ellipse at center,transparent 25%,rgba(0,0,0,0.95) 100%)}
  25%,75%{background:radial-gradient(ellipse at center,transparent 25%,rgba(255,255,255,0.6) 100%)}
}
.content{position:relative;z-index:10;text-align:center;width:100%;max-width:700px}

/* GHOST */
.ghost-container{
  position:relative;margin:0 auto 0.6rem;width:110px;height:150px;
  animation:ghost-float 2.8s ease-in-out infinite;
  filter:drop-shadow(0 0 20px rgba(255,255,255,0.8));
}
@keyframes ghost-float{
  0%,100%{transform:translateY(0) rotate(-1.5deg)}
  33%{transform:translateY(-16px) rotate(2deg)}
  66%{transform:translateY(-7px) rotate(-2.5deg)}
}
.ghost-svg{width:110px;height:150px}

.hk-title{
  font-size:clamp(22px,5vw,46px);font-weight:900;
  letter-spacing:0.1em;text-transform:uppercase;
  animation:title-chaos 0.2s step-end infinite;
  margin-bottom:0.3rem;
}
@keyframes title-chaos{
  0%{color:#fff;text-shadow:0 0 10px #fff,0 0 30px #fff}
  33%{color:#000;text-shadow:none}
  66%{color:#fff;text-shadow:-4px 0 #0ff,4px 0 #f0f}
  100%{color:#eee;text-shadow:0 0 20px #fff}
}
.hk-by{font-size:12px;letter-spacing:0.4em;text-transform:uppercase;margin-bottom:0.8rem;animation:inv 0.18s step-end infinite}
@keyframes inv{0%,50%{color:#888}25%,75%{color:#777}}
.divider{width:100%;height:1px;margin:0.7rem 0;animation:div-blink 0.18s step-end infinite}
@keyframes div-blink{
  0%,50%{background:linear-gradient(90deg,transparent,#fff,transparent)}
  25%,75%{background:linear-gradient(90deg,transparent,#000,transparent)}
}
.brand{
  font-size:clamp(20px,4.5vw,40px);font-weight:900;letter-spacing:0.18em;text-transform:uppercase;
  animation:brand-chaos 0.18s step-end infinite;
  margin:0.6rem 0 0.2rem;
}
@keyframes brand-chaos{
  0%{color:#fff;text-shadow:0 0 15px #fff,0 0 50px #fff}
  25%{color:#000;text-shadow:none}
  50%{color:#fff;text-shadow:-3px 0 #0ff,3px 0 #f0f,0 0 30px #fff}
  75%{color:#ccc;text-shadow:0 0 8px #fff}
}
.brand-sub{font-size:10px;letter-spacing:0.4em;text-transform:uppercase;margin-bottom:1rem;animation:inv 0.2s step-end infinite}
.terminal{
  background:#000;
  border-animation:tb 0.18s step-end infinite;
  border:1px solid #fff;
  border-radius:3px;padding:0.8rem 1rem;text-align:left;
  font-size:clamp(9px,1.4vw,11px);
  margin:0.7rem 0;min-height:90px;
  animation:term-blink 0.18s step-end infinite;
}
@keyframes term-blink{
  0%,50%{background:#000;color:#ccc;border-color:#fff}
  25%,75%{background:#fff;color:#000;border-color:#000}
}
.cursor{display:inline-block;width:7px;height:1em;animation:bc 0.7s step-end infinite;vertical-align:text-bottom;margin-left:1px}
@keyframes bc{
  0%,50%{background:#fff;opacity:1}
  25%,75%{background:#000;opacity:1}
  51%{opacity:0}100%{opacity:1}
}
.msgs{margin:0.8rem 0}
.msg-line{
  font-size:clamp(10px,1.7vw,12px);letter-spacing:0.08em;line-height:2.2;
  animation:msg-blink 0.2s step-end infinite;
}
.msg-line:nth-child(2){animation-delay:.04s}.msg-line:nth-child(3){animation-delay:.08s}
@keyframes msg-blink{
  0%,50%{color:#fff;text-shadow:0 0 6px #fff}
  25%,75%{color:#333;text-shadow:none}
}
.blood-drips{display:flex;justify-content:center;gap:6px;margin:0.4rem 0}
.drip{width:5px;border-radius:0 0 8px 8px;animation:da 1.8s ease-in infinite}
@keyframes da{
  0%{height:3px;opacity:0;background:#fff}
  20%{opacity:1}
  50%{background:#000}
  80%{height:30px;opacity:1}
  100%{height:38px;opacity:0}
}
.footer{margin-top:1rem;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;animation:inv 0.2s step-end infinite}
.screen-fx{animation:sfx 5s infinite}
@keyframes sfx{0%,95%,100%{filter:none}96%{filter:invert(1) hue-rotate(90deg)}97%{filter:none}98%{filter:contrast(10)}99%{filter:none}}
</style>

<script>
(function(){
  const canvas=document.getElementById('rain');
  const ctx=canvas.getContext('2d');
  const root=document.getElementById('hkRoot');
  function resize(){canvas.width=root.offsetWidth;canvas.height=root.offsetHeight;}
  resize();window.addEventListener('resize',resize);
  const chars='ァアイウエオ☠†01DEADSELIUM<>[]{}!@#GHOST';
  const drops=Array(200).fill(0).map(()=>Math.random()*60);
  let frame=0;
  function rain(){
    frame++;
    const inv=frame%2===0;
    ctx.fillStyle=inv?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    const cols=Math.floor(canvas.width/16);
    while(drops.length<cols)drops.push(0);
    for(let i=0;i<cols;i++){
      ctx.fillStyle=inv?'#000':'#fff';
      ctx.font='13px monospace';
      ctx.fillText(chars[Math.floor(Math.random()*chars.length)],i*16,drops[i]*16);
      if(drops[i]*16>canvas.height&&Math.random()>0.97)drops[i]=0;
      drops[i]++;
    }
  }
  setInterval(rain,40);

  const dripsEl=document.getElementById('drips');
  for(let i=0;i<14;i++){
    const d=document.createElement('div');
    d.className='drip';
    d.style.animationDelay=(Math.random()*2)+'s';
    d.style.animationDuration=(1.3+Math.random()*1.6)+'s';
    dripsEl.appendChild(d);
  }

  const lines=[
    '[INIT] SELIUM breach sequence started...',
    '[OK]   Firewall vaporized... ████ 100%',
    '[OK]   Root obtained',
    '[OK]   Ghost.selium injected',
    '[OK]   All data exfiltrated',
    '[!!!]  SELIUM DEVELOPMENT WAS HERE',
  ];
  const termLines=document.getElementById('termLines');
  let li=0,ci=0,cur=null;
  function type(){
    if(li>=lines.length)return;
    if(ci===0){
      cur=document.createElement('div');
      cur.style.marginBottom='3px';
      cur.innerHTML='<span>root@selium:~# </span>';
      termLines.appendChild(cur);
    }
    if(ci<lines[li].length){cur.innerHTML+=lines[li][ci];ci++;setTimeout(type,Math.random()*30+10);}
    else{li++;ci=0;setTimeout(type,260);}
  }
  setTimeout(type,500);

  const orig='YOU HAVE BEEN HACKED';
  const el=document.getElementById('mainTitle');
  const gc='!@☠†‡|/\\><[]{}01SELIUM';
  setInterval(()=>{
    if(Math.random()>0.7){
      const a=orig.split('');
      for(let i=0;i<Math.floor(Math.random()*5)+1;i++)
        a[Math.floor(Math.random()*a.length)]=gc[Math.floor(Math.random()*gc.length)];
      el.textContent=a.join('');
      setTimeout(()=>{el.textContent=orig;},80);
    }
  },120);

  function ts(){document.getElementById('ts').textContent=new Date().toISOString().replace('T',' ').slice(0,19)+' UTC';}
  ts();setInterval(ts,1000);

  setInterval(()=>{
    if(Math.random()>0.9){
      root.style.transform=`translate(${(Math.random()-.5)*8}px,${(Math.random()-.5)*6}px)`;
      setTimeout(()=>{root.style.transform='';},55);
    }
  },300);
})();
</script>
